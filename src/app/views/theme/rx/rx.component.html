<form [formGroup]="formularioRx" (ngSubmit)="enviarFormulario()">
    <div class="card-body p-3">
        <div class="table-responsive mb-4">
        <table class="table table-hover align-middle text-center shadow-sm" style="border: 1px solid #d1e7dd;">
            <thead class="table-success text-dark">
            <tr>
                <th style="width: 20%;">OJO</th>
                <th>PRESCIPCIÓN / RX</th>
                <th>AV. VL.</th>
                <th>ADD.</th>
                <th>AV. VP.</th>
                <th>DNP.</th>
            </tr>
            </thead>
            <tbody>
            <tr formGroupName="od_rx">
                <td class="fw-bold bg-light text-success">Ojo Derecho (OD)</td>
                <td data-label="Prescripción">
                    <input type="text" class="form-control form-control-sm fw-bold text-success text-center"
                            formControlName="rx_desc_od" placeholder="Ej: -1.25 -0.50 x 180">
                </td>
                <td data-label="AV. VL.">
                    <input type="text" class="form-control form-control-sm text-center"
                            formControlName="rx_av_vl_od" placeholder="AV VL">
                </td>
                <td data-label="ADD.">
                    <input type="text" class="form-control form-control-sm text-center"
                            formControlName="rx_add_od" placeholder="ADD">
                </td>
                <td data-label="AV. PV.">
                    <input type="text" class="form-control form-control-sm text-center"
                        formControlName="rx_av_vp_od" placeholder="AV VP">
                </td>
                <td data-label="DNP.">
                    <input type="text" class="form-control form-control-sm text-center"
                            formControlName="rx_dnp_od" placeholder="DNP">
                </td>
            </tr>

            <tr formGroupName="oi_rx">
                <td class="fw-bold bg-light text-success">Ojo Izquierdo (OI)</td>
                <td data-label="Prescripción">
                    <input type="text" class="form-control form-control-sm fw-bold text-success text-center"
                            formControlName="rx_desc_oi" placeholder="Prescripción">
                </td>
                <td data-label="AV. VL.">
                    <input type="text" class="form-control form-control-sm text-center"
                            formControlName="rx_av_vl_oi" placeholder="AV VL">
                </td>
                <td data-label="ADD.">
                    <input type="text" class="form-control form-control-sm text-center"
                            formControlName="rx_add_oi" placeholder="ADD">
                </td>
                <td data-label="AV. PV.">
                    <input type="text" class="form-control form-control-sm text-center"
                            formControlName="rx_av_vp_oi" placeholder="AV VP">
                </td>
                <td data-label="DNP.">
                    <input type="text" class="form-control form-control-sm text-center"
                            formControlName="rx_dnp_oi" placeholder="DNP">
                </td>
            </tr>
            </tbody>
        </table>
        </div>

        <div class="row g-3 mt-2">
            <div class="col-md-6">
                <label class="text-uppercase text-muted fw-bold d-block mb-1" style="font-size: 10px;">
                    <i class="bi bi-chat-left-text me-2 text-success"></i>Observaciones de Prescripción
                </label>
                <textarea class="form-control" formControlName="observations" placeholder="Escriba aquí notas adicionales para la receta..." rows="2"></textarea>
            </div>

            <div class="col-md-6">
                <label class="text-uppercase text-muted fw-bold d-block mb-1" style="font-size: 10px;">
                    <i class="bi bi-clipboard2-check me-2 text-success"></i>Tratamiento Recomendado
                </label>
                <textarea class="form-control" formControlName="treatment" placeholder="Ej: Lentes progresivos con filtro azul..." rows="2"></textarea>
            </div>
        </div>
    </div>
    
    <div class="col-12 d-flex justify-content-center align-items-center mt-3 mb-3" *ngIf="!hideSaveButton">
        <button type="submit" class="btn-premium btn-premium-primary">
            <i class="bi bi-file-earmark-check me-2"></i>Guardar RX Final
        </button>
    </div>
</form>
