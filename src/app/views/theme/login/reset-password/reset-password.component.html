<div class="login-container container-fluid">
  <div class="row h-100">

    <!-- Branding -->
    <div class="col-lg-6 d-none d-lg-flex branding">
      <div class="branding-content">
        <img src="assets/images/logo_optica_blanco.png" alt="Óptica Logo" class="logo">
        <h1>Nueva Contraseña</h1>
        <p>Crea una contraseña segura para proteger tu cuenta</p>
      </div>
    </div>

    <!-- Formulario -->
    <div class="col-lg-6 col-md-12 d-flex align-items-center justify-content-center">
      <mat-card class="login-card">

        <mat-card-title class="text-center">
          Restablecer Contraseña
        </mat-card-title>

        <mat-card-content>
          <form [formGroup]="resetForm" (ngSubmit)="onSubmit()">

            <mat-form-field appearance="outline" class="w-100">
              <mat-label>Nueva contraseña</mat-label>
              <input matInput [type]="hide ? 'password' : 'text'" formControlName="password">
              <button mat-icon-button matSuffix type="button" (click)="hide = !hide">
                <mat-icon>{{ hide ? 'visibility_off' : 'visibility' }}</mat-icon>
              </button>
            </mat-form-field>

            <mat-form-field appearance="outline" class="w-100">
              <mat-label>Confirmar contraseña</mat-label>
              <input matInput [type]="hide ? 'password' : 'text'" formControlName="confirmPassword">
            </mat-form-field>

            <div *ngIf="resetForm.errors?.['mismatch'] && resetForm.get('confirmPassword')?.touched" class="text-danger mb-3 small">
              Las contraseñas no coinciden.
            </div>

            <button mat-raised-button color="primary" class="w-100 login-btn" type="submit" [disabled]="resetForm.invalid || isLoading">
              {{ isLoading ? 'Procesando...' : 'Cambiar contraseña' }}
            </button>

          </form>
        </mat-card-content>

      </mat-card>
    </div>

  </div>
</div>
