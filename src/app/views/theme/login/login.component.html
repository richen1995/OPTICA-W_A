<div class="login-container container-fluid">
  
  <!-- Dynamic Background for Mobile -->
  <div class="mobile-dynamic-bg d-md-none">
    <div class="glass-shape shape-1"></div>
    <div class="glass-shape shape-2"></div>
    <div class="glass-shape shape-3"></div>
  </div>

  <div class="row h-100 position-relative">

    <!-- Branding / Imagen (Desktop only) -->
    <div class="col-lg-6 d-none d-lg-flex branding">
      <div class="branding-content">
        <img src="assets/images/logo_optica_blanco.png" alt="Óptica Logo" class="logo">
        <p>Claridad para tu vida</p>
      </div>
    </div>

    <!-- Formulario -->
    <div class="col-lg-6 col-md-12 d-flex align-items-center justify-content-center login-form-col">
      <mat-card class="login-card glass-card">

        <div class="mobile-logo-header d-md-none text-center mb-1">
          <img src="assets/images/logo_optica_blanco.png" alt="Óptica Logo" class="mobile-logo">
        </div>

        <mat-card-title class="text-center login-title">
          Iniciar Sesión
        </mat-card-title>

        <mat-card-content>
          <form [formGroup]="loginForm" (ngSubmit)="login()" class="premium-form">

            <mat-form-field appearance="outline" class="w-100 native-input">
              <mat-label>Correo electrónico</mat-label>
              <input matInput type="email" formControlName="username" placeholder="ejemplo@correo.com">
              <mat-icon matPrefix>email</mat-icon>
            </mat-form-field>

            <mat-form-field appearance="outline" class="w-100 native-input">
              <mat-label>Contraseña</mat-label>
              <input matInput [type]="hide ? 'password' : 'text'" formControlName="password" placeholder="••••••••">
              <button mat-icon-button matSuffix type="button" (click)="hide = !hide" class="v-btn">
                <mat-icon>{{ hide ? 'visibility_off' : 'visibility' }}</mat-icon>
              </button>
            </mat-form-field>

            <div class="text-end forgot-password-container">
              <a (click)="goToForgotPassword()" class="forgot-password" style="cursor: pointer;">
                ¿Olvidaste tu contraseña?
              </a>
            </div>

            <div class="action-container mt-4">
              <button mat-raised-button color="primary" class="w-100 login-btn premium-btn" type="submit" [disabled]="loginForm.invalid || isLoading">
                <span *ngIf="!isLoading">Ingresar Ahora</span>
                <mat-spinner *ngIf="isLoading" diameter="25" color="accent" class="mx-auto"></mat-spinner>
              </button>
            </div>

            <div class="text-center mt-4 register-link">
              <span class="text-muted">¿No tienes una cuenta?</span>
              <a href="javascript:void(0)" (click)="loginregister()" class="ms-1 fw-bold">
                Regístrate
              </a>
            </div> 

          </form>
        </mat-card-content>

      </mat-card>
    </div>

  </div>
</div>
