<div class="login-container container-fluid">
  <div class="row h-100">

    <!-- Branding -->
    <div class="col-lg-6 d-none d-lg-flex branding">
      <div class="branding-content">
        <img src="assets/images/logo_optica_blanco.png" alt="Óptica Logo" class="logo">
        <h1>Óptica NISSI VISIÓN</h1>
        <p>Recupera el acceso a tu cuenta de forma segura</p>
      </div>
    </div>

    <!-- Formulario -->
    <div class="col-lg-6 col-md-12 d-flex align-items-center justify-content-center">
      <mat-card class="login-card">

        <mat-card-title class="text-center">
          ¿Olvidaste tu contraseña?
        </mat-card-title>

        <mat-card-content>
          <p class="text-muted text-center mb-4">
            Ingresa tu correo electrónico y te enviaremos instrucciones para restablecer tu contraseña.
          </p>

          <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()">

            <mat-form-field appearance="outline" class="w-100">
              <mat-label>Correo electrónico</mat-label>
              <input matInput type="email" formControlName="email">
              <mat-icon matPrefix>email</mat-icon>
            </mat-form-field>

            <button mat-raised-button color="primary" class="w-100 login-btn" type="submit" [disabled]="forgotForm.invalid || isLoading">
               {{ isLoading ? 'Enviando...' : 'Enviar instrucciones' }}
            </button>

            <div class="text-center mt-4">
              <a href="javascript:void(0)" (click)="goBack()">
                Volver al inicio de sesión
              </a>
            </div> 

          </form>
        </mat-card-content>

      </mat-card>
    </div>

  </div>
</div>
