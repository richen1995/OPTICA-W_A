<div class="login-container container-fluid">
  <div class="row h-100">

    <!-- Branding -->
    <div class="col-lg-6 d-none d-lg-flex branding">
      <div class="branding-content">
        <img src="assets/images/logo_optica_blanco.png" alt="Óptica Logo" class="logo">
        <h1>Óptica NISSI VISIÓN</h1>
        <p>Claridad para tu vida</p>
      </div>
    </div>

    <!-- Formulario -->
    <div class="col-lg-6 col-md-12 d-flex align-items-center justify-content-center">

      <mat-card class="login-card">

        <mat-card-title class="text-center">
          Crear Cuenta
        </mat-card-title>

        <mat-card-content>

          <form [formGroup]="registerForm" (ngSubmit)="register()">

            <!-- Nombre -->
            <mat-form-field appearance="outline" class="w-100">
              <mat-label>Nombres</mat-label>
              <input matInput formControlName="firstName">
              <mat-icon matPrefix>person</mat-icon>
              <mat-error *ngIf="f['firstName'].touched && f['firstName'].invalid">
                Nombre requerido
              </mat-error>
            </mat-form-field>

            <!-- Apellido -->
            <mat-form-field appearance="outline" class="w-100">
              <mat-label>Apellidos</mat-label>
              <input matInput formControlName="lastName">
              <mat-icon matPrefix>badge</mat-icon>
            </mat-form-field>

            <!-- Cedula -->
            <mat-form-field appearance="outline" class="w-100">
              <mat-label>Cédula</mat-label>
              <input matInput formControlName="identification">
              <mat-icon matPrefix>credit_card</mat-icon>
              <mat-error *ngIf="f['identification'].errors?.['cedula']">
                Cédula ecuatoriana inválida
              </mat-error>
            </mat-form-field>

            <!-- Email -->
            <mat-form-field appearance="outline" class="w-100">
              <mat-label>Email</mat-label>
              <input matInput formControlName="email">
              <mat-icon matPrefix>email</mat-icon>
              <mat-error *ngIf="f['email'].errors?.['email']">
                Email inválido
              </mat-error>
            </mat-form-field>

            <!-- Password -->
            <mat-form-field appearance="outline" class="w-100">
              <mat-label>Contraseña</mat-label>
              <input matInput [type]="hide ? 'password':'text'" formControlName="password">
              <button mat-icon-button matSuffix type="button" (click)="hide=!hide">
                <mat-icon>{{hide?'visibility_off':'visibility'}}</mat-icon>
              </button>
            </mat-form-field>

            <!-- Barra seguridad -->
            <div class="password-strength-wrapper">
              <span class="strength-label">Seguridad:</span>
              <div class="password-strength">
                <div class="bar" [style.width.%]="passwordStrength"></div>
              </div>
            </div>
            
            <!-- Confirmar -->
            <mat-form-field appearance="outline" class="w-100">
              <mat-label>Confirmar contraseña</mat-label>
              <input matInput [type]="hide2?'password':'text'" formControlName="confirmPassword">
              <button mat-icon-button matSuffix type="button" (click)="hide2=!hide2">
                <mat-icon>{{hide2?'visibility_off':'visibility'}}</mat-icon>
              </button>
              <mat-error *ngIf="registerForm.errors?.['notMatch']">
                Las contraseñas no coinciden
              </mat-error>
            </mat-form-field>

            <button mat-raised-button color="primary"
              class="w-100 login-btn"
              type="submit"
              [disabled]="registerForm.invalid || loading">

              <mat-spinner *ngIf="loading" diameter="20"></mat-spinner>
              <span *ngIf="!loading">Registrarse</span>

            </button>

          </form>

        </mat-card-content>

      </mat-card>

    </div>

  </div>
</div>
